openapi: 3.0.3
info:
  title: Future Engineer API
  description: API documentation for Future Engineer Institute
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost/api/v1
    description: Local development server
  - url: https://your-domain.com/api/v1
    description: Production server

tags:
  - name: Sliders
    description: Slider management endpoints
  - name: Institute
    description: Institute information endpoints
  - name: Organization
    description: Organization structure endpoints
  - name: Departments
    description: Department-related endpoints
  - name: Faculty
    description: Faculty members endpoints
  - name: Labs
    description: Laboratory endpoints
  - name: Projects
    description: Research and student projects endpoints
  - name: Academic
    description: Academic-related endpoints

paths:
  /sliders:
    get:
      tags:
        - Sliders
      summary: Get all sliders
      description: Retrieve all active sliders with pagination (4 items per page)
      operationId: getSliders
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SliderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /about/institute:
    get:
      tags:
        - Institute
      summary: Get institute information
      description: Retrieve information about the institute (vision, message, description, image)
      operationId: getInstituteInfo
