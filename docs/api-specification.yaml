components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Response data
        message:
          type: string
          example: Success message
      required:
        - success
        - data
        - message

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error message
      required:
        - success
        - message

    SliderResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Slider'
            current_page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 4
            total:
              type: integer
              example: 10
        message:
          type: string
          example: The sliders fetched successfully
      required:
        - success
        - data
        - message

    Slider:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Slider Title
        image:
          type: string
          format: uri
          example: http://domain.com/path/to/image.jpg
        link:
          type: string
          format: uri
          example: http://link.com
        status:
          type: string
          example: active

    InstituteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            vision:
              type: string
              example: Institute vision
            message:
              type: string
              example: Institute message
            description:
              type: string
              example: Institute description
            image:
              type: string
              format: uri
              example: http://domain.com/path/to/image.jpg
        message:
          type: string
          example: The unit institutes fetched successfully
      required:
        - success
        - data
        - message

    DepartmentResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Basic Sciences
            description:
              type: string
              example: Department description
            image:
              type: string
              format: uri
              example: http://domain.com/path/to/image.jpg
        message:
          type: string
          example: The Department fetched successfully
      required:
        - success
        - data
        - message

    DepartmentPlanResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            department_name:
              type: string
              example: Basic Sciences
            research_plan:
              type: string
              format: uri
              example: http://domain.com/storage/department_plans/file.pdf
        message:
          type: string
          example: The department plan fetched successfully
      required:
        - success
        - data
        - message

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Bad request

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Resource not found

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Internal server error

